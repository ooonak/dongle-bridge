name: Zephyr Build & Test v4.3

on:
  push:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout the repo into 'app' folder ---
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: app  # your repo root will be in $GITHUB_WORKSPACE/app

      # --- Set up Python 3.12 ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      # --- Cache Zephyr SDK ---
      - name: Cache Zephyr SDK
        uses: actions/cache@v3
        id: sdk-cache
        with:
          path: ~/.zephyr-sdk
          key: zephyr-sdk-0.17.4
          restore-keys: |
            zephyr-sdk-0.17.4

      # --- Cache pip packages ---
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-

      # --- Setup Zephyr environment ---
      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: app
          toolchains: arm-zephyr-eabi:x86_64-zephyr-elf

      # --- Initialize west workspace ---
      - name: Initialize west
        run: |
          cd app
          # Only initialize if workspace metadata does not exist
          if [ ! -d "$GITHUB_WORKSPACE/.west" ]; then
            west init -l .
          fi
          west update

      # --- Debug folders ---
      - name: List directories
        run: |
          cd $GITHUB_WORKSPACE
          pwd
          ls -R .
          cd -

      # --- Build native_sim (workspace application) ---
      - name: Build native_sim
        run: |
          cd app
          west build -p -b native_sim app

      # --- Quick run native_sim (5s timeout) ---
      - name: Run native_sim
        run: |
          cd app
          timeout 5 .app/build/zephyr/zephyr

      # --- Run native_sim tests with Twister ---
      - name: Run native_sim tests
        run: |
          cd app
          west twister -p native_sim app

      # --- Build nRF52840 Dongle ---
      - name: Build nRF52840 Dongle
        run: |
          cd app
          west build -p -b nrf52840dongle app
